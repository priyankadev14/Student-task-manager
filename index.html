
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}

::-webkit-scrollbar{
    display:none;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc,#00d4ff);
    background-size:200% 200%;
    animation:gradient 10s ease infinite, fadePage 0.6s ease;
}

@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

@keyframes fadePage{
    from{opacity:0}
    to{opacity:1}
}

.container{
    width:100%;
    max-width:500px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    animation:floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
}

h2{text-align:center;color:#fff;margin-bottom:25px;}

.inputRow{display:flex;gap:10px;}

input{
    flex:1;
    padding:14px;
    border-radius:12px;
    border:none;
    outline:none;
    transition:0.3s;
}

input:focus{
    box-shadow:0 0 0 3px rgba(255,255,255,0.4),
               0 10px 20px rgba(0,0,0,0.2);
    transform:translateY(-1px);
}

.addBtn{
    padding:0 20px;
    border:none;
    border-radius:12px;
    background:#fff;
    color:#2575fc;
    cursor:pointer;
    font-weight:600;
    position:relative;
    overflow:hidden;
}

.addBtn::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(37,117,252,0.2);
    top:0;
    left:-100%;
    transition:0.4s;
}

.addBtn:hover::after{left:0}

#errorMsg{color:#ffeaa7;margin-top:10px;font-size:14px;}

#taskList{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:350px;
    overflow:auto;
}

.task{
    background:#fff;
    padding:15px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
    animation:fade 0.3s ease;
}

.task:hover{
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

.completed{
    text-decoration:line-through;
    opacity:0.5;
    animation:completeAnim 0.3s;
}

@keyframes completeAnim{
    from{transform:scale(1.05)}
    to{transform:scale(1)}
}

.actions{display:flex;gap:6px;}

.btn{
    border:none;
    width:35px;
    height:35px;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
}

.btn:active{transform:scale(0.9)}

.complete{background:#00b894}
.delete{background:#d63031}

.empty{text-align:center;color:#fff;margin-top:20px;}

/* delete animation */
.task.removing{
    animation:removeTask 0.4s forwards;
}

@keyframes removeTask{
    to{
        opacity:0;
        transform:translateX(50px);
        height:0;
        padding:0;
        margin:0;
    }
}

/* Toast */
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2d3436;
    color:#fff;
    padding:10px 15px;
    border-radius:10px;
    opacity:0;
    transition:0.3s;
}

.toast.show{opacity:1}

/* Modal */
.confirmBox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.confirmContent{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.confirmActions{
    margin-top:15px;
    display:flex;
    justify-content:space-around;
}

.confirmActions button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.confirmActions button:first-child{background:#00b894;color:#fff;}
.confirmActions button:last-child{background:#d63031;color:#fff;}

</style>
</head>

<body>

<div class="container">
    <h2><i class="fas fa-clipboard-list"></i> Task Manager</h2>

    <div class="inputRow">
        <input id="taskInput" placeholder="Add task...">
        <button class="addBtn" onclick="addTask()">Add</button>
    </div>

    <p id="errorMsg"></p>

    <div id="taskList"></div>
    <p id="emptyMessage" class="empty">No tasks yet 🎉</p>
</div>

<div id="toast" class="toast"></div>

<div id="confirmBox" class="confirmBox">
    <div class="confirmContent">
        <p id="confirmText"></p>
        <div class="confirmActions">
            <button onclick="handleConfirm(true)">Yes</button>
            <button onclick="handleConfirm(false)">No</button>
        </div>
    </div>
</div>

<script>

const API="http://localhost:5000/tasks"
const input=document.getElementById("taskInput")

input.addEventListener("keypress",e=>{
    if(e.key==="Enter") addTask()
})

function showToast(msg){
    const t=document.getElementById("toast")
    t.textContent=msg
    t.classList.add("show")
    setTimeout(()=>t.classList.remove("show"),2000)
}

let confirmCallback=null
function showConfirm(msg,cb){
    document.getElementById("confirmText").textContent=msg
    document.getElementById("confirmBox").style.display="flex"
    confirmCallback=cb
}

function handleConfirm(res){
    document.getElementById("confirmBox").style.display="none"
    if(confirmCallback) confirmCallback(res)
}

function escapeHTML(str){
    const d=document.createElement("div")
    d.appendChild(document.createTextNode(str))
    return d.innerHTML
}

async function getTasks(){
    try{
        const res=await fetch(API)
        const tasks=await res.json()

        const list=document.getElementById("taskList")
        const empty=document.getElementById("emptyMessage")
        list.innerHTML=""

        if(tasks.length===0){
            empty.style.display="block"
            return
        }

        empty.style.display="none"

        tasks.forEach(task=>{
            const div=document.createElement("div")
            div.className="task"

            div.innerHTML=`
                <span class="${task.status==='completed'?'completed':''}">
                    ${escapeHTML(task.title)}
                </span>
                <div class="actions">
                    <button class="btn complete" onclick="completeTask('${task._id}')"><i class="fas fa-check"></i></button>
                    <button class="btn delete" onclick="deleteTask(event,'${task._id}')"><i class="fas fa-trash"></i></button>
                </div>
            `

            list.appendChild(div)
        })

    }catch(err){
        showToast("Server error")
    }
}

async function addTask(){
    let title=input.value.trim()
    const error=document.getElementById("errorMsg")
    error.textContent=""

    if(title===""){
        error.textContent="Enter task!"
        return
    }

    try{
        await fetch(API,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({title})
        })

        input.value=""
        showToast("Task added")
        getTasks()

    }catch(err){
        showToast("Error adding task")
    }
}

async function deleteTask(event,id){
    showConfirm("Delete this task?",async(ok)=>{
        if(!ok) return

        const taskDiv=event.target.closest(".task")
        if(taskDiv) taskDiv.classList.add("removing")

        setTimeout(async()=>{
            try{
                await fetch(API+"/"+id,{method:"DELETE"})
                showToast("Deleted")
                getTasks()
            }catch(err){
                showToast("Error deleting")
            }
        },300)
    })
}

async function completeTask(id){
    try{
        await fetch(API+"/"+id,{method:"PUT"})
        showToast("Completed")
        getTasks()
    }catch(err){
        showToast("Error updating")
    }
}

getTasks()

</script>

</body>
</html>
